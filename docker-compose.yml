# docker-compose.yml – MarketMoose Deployment Configuration
#
# Defines two services:
#  - redis: Caching backend (Redis 7)
#  - web: Flask web server for MarketMoose
#
# Includes:
#  - Security hardening (no privileges, read-only FS)
#  - Persistent volumes for transactions and cached price data
#  - Environment variables for configuration

services:

  redis:
    image: redis:7
    restart: unless-stopped
    # No ports exposed - Redis only reachable internally by web container

    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # Rotate after 10 MB
        max-file: "5"     # Keep 5 rotated files (50 MB total)

    networks:
      - internal # Redis only on internal network
    volumes:
      - redis_data:/data

  web:
    build: .
    image: marketmoose:latest
    restart: unless-stopped
    depends_on:
      - redis

    ports:
      - "127.0.0.1:30053:8000" # External port 30053 → Flask app inside container on port 8000

    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # Rotate after 10 MB
        max-file: "5"     # Keep 5 rotated files (50 MB total)

    environment:
      - TRANSACTIONS_FILE=/app/data/transactions.json
      - CACHE_DIR=/app/stock_data_cache
      - DIVIDENDS_FILE=/app/data/dividends.json
      - REDIS_URL=redis://redis:6379/0
      - FLASK_APP=marketMoose

    networks:
      - internal # Can reach Redis
      - external # Can accept incoming connections

    # ─────────────────────────────────────────────────────────────────────────
    # Drop all Linux capabilities (so the process has no extra privileges)
    # ─────────────────────────────────────────────────────────────────────────
    cap_drop:
      - ALL

    # ─────────────────────────────────────────────────────────────────────────
    # Restrict privileges & make root fs read-only except for mounted volumes
    # ─────────────────────────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true

    # Mount the container's root filesystem as read-only.
    # (Any path not explicitly listed under "volumes:" will be read-only.)
    read_only: true

    # Mount a tmpfs at /tmp so that certain libraries or your app can write to /tmp.
    tmpfs:
      - /tmp

    # ─────────────────────────────────────────────────────────────────────────
    # VOLUMES (override read_only for these paths so they remain writeable)
    # ─────────────────────────────────────────────────────────────────────────
    volumes:
      # 1) The transactions and dividends file are stored in named volumes,
      #    and avoid host-FS permission mismatches and stay writable.
      - mm_data:/app/data

      # 2) The yfinance cache are stored in named volumes,
      #    and avoid host-FS permission mismatches and stay writable.
      - mm_stock_data_cache:/app/stock_data_cache

      # 3) The logs are stored in named volumes, and avoid host-FS permission
      #    mismatch and stay writeable.
      - mm_logs:/app/logs

# ─────────────────────────────────────────────────────────────────────────────
# Top-level “volumes:” must be defined here, at the same indent as “services:”
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  redis_data:
  mm_data:
  mm_stock_data_cache:
  mm_logs:

# ─────────────────────────────────────────────────────────────────────────────────────
# Internal network - Redis is isolated and not reachable from host or other containers
# ─────────────────────────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
    internal: true # Redis lives here, no external access
  external:
    driver: bridge # Web container accepts connections through this
